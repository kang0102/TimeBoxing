<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高鐵自動訂票</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh; 
            display: flex;
            flex-direction: column;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f0f2f5;
            overflow: hidden; 
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            flex-shrink: 0; 
        }

        .back-btn {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            margin-right: 15px;
            transition: background 0.3s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.4); }

        .iframe-container {
            flex-grow: 1; 
            width: 100%;
            position: relative; 
        }

        iframe {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">⬅ 返回工具箱</a>
        <h1 style="margin: 0; font-size: 1.5rem;">🚄 高鐵自動訂票小幫手</h1>
    </header>

    <div class="iframe-container">
        <iframe src="https://neilkang-你的專案名稱.hf.space" allow="clipboard-read; clipboard-write"></iframe>
    </div>

</body>
</html>
